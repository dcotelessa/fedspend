services:
  - type: web
    name: fedspend
    runtime: node
    plan: free
    region: oregon
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter frontend build && pnpm --filter backend build
    startCommand: node backend/dist/backend/src/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
