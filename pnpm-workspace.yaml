packages:
  - 'backend'
  - 'frontend'
allowBuilds:
  '@parcel/watcher': true
  better-sqlite3: true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  unrs-resolver: true
onlyBuildDependencies:
  - '@nestjs/core'
  - 'better-sqlite3'
  - 'unrs-resolver'
  - 'esbuild'
  - '@parcel/watcher'
  - 'lmdb'
  - 'msgpackr-extract'
